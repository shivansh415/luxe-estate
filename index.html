<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Luxe Estates — An immersive cinematic journey through the world's most extraordinary luxury residences. Experience architecture as art." />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Luxe Estates — Cinematic Luxury Living</title>

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Fonts: Luxury typography -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Bricolage+Grotesque:opsz,wght@12..96,200;12..96,300;12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap" rel="stylesheet" />

    <!-- Preload critical assets -->
    <link rel="preload" href="/textures/marble-generated.png" as="image" />
    <link rel="preload" href="/videos/section-1-reveal.mp4" as="video" type="video/mp4" />
    <link rel="preload" href="/menu-bg.jpeg" as="image" />

    <style>
      /* Critical CSS - prevents FOUC */
      *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        background: #0a0a0a;
        overflow-x: hidden;
      }

      body {
        background: #0a0a0a;
        color: #ffffff;
        font-family: 'Bricolage Grotesque', -apple-system, BlinkMacSystemFont, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }

      #root {
        min-height: 100vh;
      }

      /* Smooth scroll behavior for anchor links */
      html.lenis, html.lenis body {
        height: auto;
      }

      .lenis.lenis-smooth {
        scroll-behavior: auto !important;
      }

      .lenis.lenis-smooth [data-lenis-prevent] {
        overscroll-behavior: contain;
      }

      .lenis.lenis-stopped {
        overflow: hidden;
      }

      .lenis.lenis-smooth iframe {
        pointer-events: none;
      }

      /* Selection styling */
      ::selection {
        background: rgba(212, 175, 55, 0.3);
        color: #fff;
      }

      /* Scrollbar styling */
      ::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
